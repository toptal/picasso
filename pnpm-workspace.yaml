packages:
  - 'packages/*'
  - 'packages/base/*'
autoInstallPeers: true
linkWorkspacePackages: true

# Supply-chain safeguard: refuse to install any public package published
# less than this many minutes ago. Internal scopes are excluded so we can
# still consume freshly-published @toptal/* and @topkit/*.
# 7 days = 60 * 24 * 7 = 10080 minutes
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@toptal/*'
  - '@topkit/*'

nodeLinker: hoisted

onlyBuiltDependencies:
  - '@sentry/cli'
  - '@swc/core'
  - core-js
  - core-js-pure
  - cypress
  - esbuild
  - highlight.js
  - nx
  - styled-components

overrides:
  '@cypress/request>form-data': '2.5.5'
  '@nx/js': '22.7.5'
  '@storybook/core-server>ip': 'npm:@toptal/davinci-ip@2.0.3'
  '@storybook/react': '^6.5.15'
  '@swc/plugin-styled-components': '9.1.0'
  '@types/node-fetch>form-data': '3.0.4'
  '@types/react': '17'
  '@types/unist': '3.0.0'
  ansi-regex: '^5.0.1'
  axios: '1.12.0'
  'find-babel-config>json5': '1'
  glob-parent: '^6.0.2'
  js-yaml: '^3.13.1'
  lodash: '^4.17.21'
  'marksy>marked': '^0.7.0'
  'meow>trim-newlines': '^3'
  micromatch: '^4.0.8'
  minimist: '^1.2.6'
  node-fetch: '^2.6.7'
  npm: '11.6.0'
  nx: '22.7.5'
  postcss: '^8.4.32'
  prettier: '^2.5.1'
  prismjs: '^1.30.0'
  react: '^18.2.0'
  react-dom: '^18.2.0'
  react-test-renderer: '^19.2.0'
  semver-regex: '^3.1.3'
  trim: '^0.0.3'
  unset-value: '^2.0.1'
  webpack: '^5.0.0'
  webpack-dev-middleware: '5.3.4'
  yaml: '2'

patchedDependencies:
  '@changesets/get-github-info@0.6.0': patches/@changesets__get-github-info@0.6.0.patch
  '@storybook/react-docgen-typescript-plugin@1.0.2-canary.6.9d540b91e815f8fc2f8829189deb00553559ff63.0': 'patches/@storybook__react-docgen-typescript-plugin@1.0.2-canary.6.9d540b91e815f8fc2f8829189deb00553559ff63.0.patch'
  'webpack@5.98.0': 'patches/webpack@5.98.0.patch'
resolvePeersFromWorkspaceRoot: true
strictPeerDependencies: false
