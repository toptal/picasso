name: Release Alpha Package

on:
  issue_comment:
    types: [created]

jobs:
  triggerPrWorkflow:
    name: Trigger PR Workflow
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '@toptal-bot run package:alpha-release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC token requests
      actions: write
      issues: write
      pull-requests: write
    env:
      STATUS_CHECK_NAME: Publish Alpha Package
      STATUS_TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Feedback on action started
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.issue;
            await github.rest.reactions.createForIssueComment({ owner, repo, comment_id: context.payload.comment.id, content: '+1' });

      - id: branch
        uses: xt0rted/pull-request-comment-branch@v2.0.0

      - name: Specify branch
        id: get-branch
        run: |
          echo "branch=${{ steps.branch.outputs.head_ref }}" >> $GITHUB_OUTPUT
          echo "sha=${{ steps.branch.outputs.head_sha }}" >> $GITHUB_OUTPUT

      - name: Configure git user
        run: |
          git config --global user.email "bot@toptal.com"
          git config --global user.name "toptal-bot"

      - name: Checkout the latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.get-branch.outputs.branch }}
          fetch-depth: 0 # otherwise, you will fail to push refs to dest repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18
          registry-url: 'https://registry.npmjs.org'

      - name: Set status check - pending
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.issue;
            await github.rest.repos.createCommitStatus({
              repo,
              owner,
              state: 'pending',
              sha: "${{ steps.get-branch.outputs.sha }}",
              context: process.env.STATUS_CHECK_NAME,
              target_url: process.env.STATUS_TARGET_URL
            })

      - name: Trigger alpha packages
        id: alpha-package
        uses: ./.github/actions/build-publish-alpha-package
        with:
          branch: ${{ steps.get-branch.outputs.branch }}
          root-folder: '.'

      - name: Alpha package — Handle success
        if: ${{ success() }}
        uses: actions/github-script@v7
        env:
          versions: ${{ steps.alpha-package.outputs.versions }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.issue;
            const versions = JSON.parse(process.env.versions || '{}');
            
            let message = '✅ **Alpha packages published successfully!**\n\n';
            
            if (Object.keys(versions).length > 0) {
              message += '📦 **Published versions:**\n';
              for (const [packageName, version] of Object.entries(versions)) {
                message += `- \`${packageName}@${version}\`\n`;
              }
              message += '\n';
            }
            
            message += '🔒 **Published using OIDC trusted publishing** for enhanced security.\n\n';
            message += '💡 You can install these alpha versions using:\n';
            message += '```bash\n';
            message += 'npm install @toptal/package-name@alpha-version\n';
            message += '```';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: message
            });

            await github.rest.repos.createCommitStatus({
              repo,
              owner,
              state: 'success',
              sha: "${{ steps.get-branch.outputs.sha }}",
              context: process.env.STATUS_CHECK_NAME,
              target_url: process.env.STATUS_TARGET_URL
            });

      - name: Alpha package — Handle failure
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.issue;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: '❌ **Alpha package publishing failed**\n\nPlease check the [workflow run](${{ env.STATUS_TARGET_URL }}) for details.'
            });

            await github.rest.repos.createCommitStatus({
              repo,
              owner,
              state: 'failure',
              sha: "${{ steps.get-branch.outputs.sha }}",
              context: process.env.STATUS_CHECK_NAME,
              target_url: process.env.STATUS_TARGET_URL
            });
