name: 'Deploy to GitHub Pages'
description: 'Upload artifact and deploy to GitHub Pages'

inputs:
  content-path:
    description: 'Path to the content to deploy'
    required: true
    default: 'gh-pages-content'
  deployment-name:
    description: 'Name for the deployment (for identification)'
    required: false
    default: 'GitHub Pages'

outputs:
  deployment-url:
    description: 'URL of the deployed site'
    value: ${{ steps.deployment.outputs.page_url }}
  deployment-id:
    description: 'ID of the deployment'
    value: ${{ steps.deployment.outputs.deployment_id }}

runs:
  using: 'composite'
  steps:
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ inputs.content-path }}

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Sync content to gh-pages branch
      shell: bash
      run: |
        cd "${{ inputs.content-path }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ ! -d ".git" ]; then
          git init -b gh-pages
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        else
          # Ensure we're on gh-pages branch (the failed checkout may have
          # left us on 'master' after git init with no gh-pages ref)
          CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")
          if [ "$CURRENT_BRANCH" != "gh-pages" ]; then
            git checkout -B gh-pages
          fi
          # Ensure remote URL uses the token for authentication
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" 2>/dev/null || \
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        fi

        git add -A
        if git diff --cached --quiet; then
          echo "gh-pages branch already up to date"
        else
          git commit -m "Sync: ${{ inputs.deployment-name }}"
          git push origin gh-pages
        fi

    - name: Deployment summary
      shell: bash
      run: |
        echo "🚀 **${{ inputs.deployment-name }}** deployed successfully!" >> $GITHUB_STEP_SUMMARY
        echo "📍 Deployment URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
